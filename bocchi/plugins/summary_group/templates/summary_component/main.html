<style>
    .markdown-body {
        box-sizing: border-box;
        min-width: 200px;
        max-width: 980px;
        margin: 0 auto;
        padding: 45px;
    }

    @media (max-width: 767px) {
        .markdown-body {
            padding: 15px;
        }
    }
</style>

{% from 'partials/_component_macros.jinja' import wrapper %}
{% call wrapper(data, 'markdown-wrapper') %}
<article class="markdown-body">
    {{ data.markdown_content | md | enhance_avatars(data.user_info_cache) | safe }}
</article>
{% endcall %}
